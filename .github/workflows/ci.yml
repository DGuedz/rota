name: ROTA CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Jest Test Suite (115+ tests)
      run: npm run test

    - name: Build TypeScript Project
      run: npm run build

  deploy-soroban-testnet:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Install Soroban CLI
      run: cargo install --locked soroban-cli

    - name: Build Soroban Contracts
      run: soroban contract build

    - name: Deploy to Stellar Testnet
      env:
        SOROBAN_SECRET_KEY: ${{ secrets.SOROBAN_SECRET_KEY }}
      run: |
        echo "Preparing deployment to Stellar Testnet..."
        # Adicionar os comandos de deploy on-chain do contrato aqui
        # Ex: soroban contract deploy --wasm target/wasm32-unknown-unknown/release/rota_contract.wasm --source $SOROBAN_SECRET_KEY --network testnet
